syntax = "proto3";

package douyin;

option go_package = "github.com/bililive-go/bililive-go/src/recorders/danmaku/douyin";

// PushFrame — WebSocket 传输帧
message PushFrame {
  uint64 seqId = 1;
  uint64 logId = 2;
  uint64 service = 3;
  uint64 method = 4;
  repeated HeadersItem headersList = 5;
  string payloadEncoding = 6;
  string payloadType = 7;
  bytes payload = 8;
}

message HeadersItem {
  string key = 1;
  string value = 2;
}

// Response — GZIP 解压后的容器
message Response {
  repeated Message messagesList = 1;
  string cursor = 2;
  uint64 fetchInterval = 3;
  uint64 now = 4;
  string internalExt = 5;
  uint32 fetchType = 6;
  uint64 heartbeatDuration = 8;
  bool needAck = 9;
  bool historyNoMore = 12;
}

// Message — 单条消息
message Message {
  string method = 1;
  bytes payload = 2;
  int64 msgId = 3;
  int64 msgType = 4;
  int64 offset = 5;
}

// ChatMessage — 弹幕消息
message ChatMessage {
  Common common = 1;
  User user = 2;
  string content = 3;
  bool visibleToSender = 4;
  int64 backgroundImage = 5;
  string fullScreenTextColor = 6;
  int64 backgroundImageV2 = 7;
}

// Common — 消息元数据
message Common {
  string method = 1;
  int64 msgId = 2;
  int64 roomId = 3;
  int64 createTime = 4;
  int64 monitor = 5;
  int64 showEffect = 6;
}

// GiftMessage — 礼物消息
message GiftMessage {
  Common common = 1;
  int64 giftId = 2;
  int32 repeatCount = 5;
  int32 comboCount = 6;
  User user = 7;
  int32 repeatEnd = 9;
  Gift gift = 15;
}

// Gift — 礼物详情
message Gift {
  string describe = 2;
  int64 id = 5;
  int32 type = 11;
  int32 diamondCount = 12;
  string name = 16;
}

// User — 用户信息
message User {
  int64 id = 1;
  string nickname = 2;
  string avatar = 3;
}
